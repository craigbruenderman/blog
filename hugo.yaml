baseURL: https://example.org/
languageCode: en-us
title: My New Hugo Site
theme: tailroad

# Refer to this link https://gohugo.io/functions/css/tailwindcss/  
build:
  buildStats:
    enable: true
  cachebusters:
  - source: assets/notwatching/hugo_stats\.json
    target: css
  - source: (postcss|tailwind)\.config\.js
    target: css
module:
  mounts:
  - source: assets
    target: assets
  - disableWatch: true
    source: hugo_stats.json
    target: assets/notwatching/hugo_stats.json
params:
  mainSections: ['posts']
  sidebar:
    enable: true
    widgets: ['recent', 'categories', 'social']
    recentsCount: 6 # Default is 5
    showCounts: true # Default is false
outputs:
  home: ['html', 'rss', 'json']
menu:
  main:
  - identifier: home
    name: home
    url: /
    weight: -100
  - identifier: notes
    name: notes
    url: /notes